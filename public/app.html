<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工作台</title>
    <style>
        :root {
            --theme-main: #d6bebf;
            --theme-dark: #6f5758;
            --theme-soft: #f7f1f1;
            --theme-panel: #fffdfc;
            --theme-border: #e7d7d7;
            --theme-text: #3f2f30;
            --theme-sub: #826e70;
            --theme-accent: #b7848a;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #f6ecec 0%, #f2e6e7 35%, #efe2e3 100%);
            color: var(--theme-text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        .wrap {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .auth-wrap {
            max-width: 460px;
            margin: 40px auto;
        }

        .card {
            background: var(--theme-panel);
            border: 1px solid var(--theme-border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 12px 30px rgba(111, 87, 88, 0.12);
        }

        h2 {
            margin: 0 0 12px;
        }

        .auth-title {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: .4px;
        }

        .auth-subtitle {
            margin: 0 0 14px;
            color: var(--theme-sub);
            font-size: 13px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            margin: 8px 0 4px;
            color: var(--theme-sub);
        }

        input,
        button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid var(--theme-border);
            background: #fff;
            color: var(--theme-text);
            padding: 10px;
        }

        button {
            cursor: pointer;
            background: var(--theme-main);
            border: none;
            font-weight: 700;
            transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(111, 87, 88, 0.2);
        }

        .btn2 {
            background: #cda3a8;
        }

        .btn3 {
            background: #c2a2a5;
        }

        .btn4 {
            background: var(--theme-dark);
            color: #fff;
        }

        .hint {
            color: var(--theme-sub);
            font-size: 13px;
        }

        .result {
            margin-top: 8px;
            min-height: 22px;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .hidden {
            display: none;
        }

        .auth-panel {
            background: linear-gradient(180deg, #fffefe 0%, #faf5f5 100%);
            border: 1px solid var(--theme-border);
            border-radius: 10px;
            padding: 14px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity .18s ease, transform .18s ease;
        }

        .auth-panel.hidden {
            display: none;
            opacity: 0;
            transform: translateY(4px);
        }

        .auth-actions {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .switch-link {
            display: inline-block;
            color: var(--theme-dark);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: transparent;
            padding: 0;
            width: auto;
        }

        .switch-link:hover {
            color: var(--theme-accent);
            text-decoration: underline;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 10px;
            margin: 10px 0 12px;
        }

        .toolbar-toggle {
            display: none;
            margin-top: 10px;
            background: #d8c3c5;
            color: var(--theme-text);
        }

        .iframe-shell {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--theme-border);
            background: #fff;
        }

        .presentation-host {
            width: 100%;
            height: 78vh;
            border: 0;
            background: #fff;
            overflow: auto;
        }

        @media (max-width: 900px) {
            .wrap {
                margin: 12px auto;
                padding: 0 10px;
            }

            .card {
                padding: 14px;
                border-radius: 12px;
            }

            .toolbar {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }

            .presentation-host {
                height: 68vh;
            }
        }

        @media (max-width: 640px) {
            .auth-wrap {
                max-width: 100%;
                margin: 16px auto;
            }

            .auth-title {
                font-size: 20px;
            }

            .auth-subtitle,
            .hint,
            label {
                font-size: 12px;
            }

            input,
            button {
                min-height: 40px;
                padding: 10px 9px;
            }

            .toolbar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .toolbar-toggle {
                display: block;
            }

            .toolbar.is-collapsed {
                display: none;
            }

            .auth-actions {
                flex-wrap: wrap;
            }

            .switch-link {
                width: 100%;
                text-align: left;
            }

            .presentation-host {
                height: 62vh;
            }
        }

        @media (max-width: 420px) {
            .card {
                padding: 12px;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 18px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div id="authCard" class="card auth-wrap">
            <h2 class="auth-title">欢迎使用工作台</h2>
            <p class="auth-subtitle">请先登录账号后继续操作</p>

            <div id="loginPanel" class="auth-panel">
                <h3>登录</h3>
                <label>用户名</label><input id="loginUsername" />
                <label>密码</label><input id="loginPassword" type="password" />
                <div class="auth-actions">
                    <button id="loginBtn">登录</button>
                </div>
                <div class="auth-actions">
                    <button id="toRegisterBtn" class="switch-link" type="button">没有账号？注册账号</button>
                </div>
            </div>

            <div id="registerPanel" class="auth-panel hidden">
                <h3>注册</h3>
                <label>用户名</label><input id="regUsername" />
                <label>密码</label><input id="regPassword" type="password" />
                <label>邀请码</label><input id="regInvite" />
                <div class="hint">邀请码请发送邮件至 krvyft@pm.me 获取</div>
                <div class="auth-actions">
                    <button id="registerBtn" class="btn2">注册</button>
                </div>
                <div class="auth-actions">
                    <button id="toLoginBtn" class="switch-link" type="button">已有账号？返回登录</button>
                </div>
            </div>
            <div id="authResult" class="result"></div>
        </div>

        <div id="workspaceCard" class="card hidden">
            <h2>生成器</h2>
            <div class="hint" id="userHint"></div>
            <button id="toolbarToggleBtn" class="toolbar-toggle" type="button" aria-expanded="false">展开功能按钮</button>
            <div class="toolbar">
                <button id="aiBtn" class="btn2">AI 生成处方</button>
                <button id="randBtn" class="btn2">随机编号</button>
                <button id="saveBtn" class="btn3">保存工作区</button>
                <button id="loadBtn" class="btn3">加载最近</button>
                <button id="pngBtn" class="btn4">下载 PNG</button>
                <button id="logoutBtn">退出登录</button>
            </div>
            <div class="iframe-shell">
                <div id="presentationHost" class="presentation-host"></div>
            </div>
            <div id="workResult" class="result"></div>
        </div>
    </div>

    <script>
        (async () => { try { const K = "__SCRIPT_KEY__"; const kb = Uint8Array.from(atob(K), c => c.charCodeAt(0)); const r = await fetch((window.API_BASE || "") + "/api/script/app"); if (!r.ok) throw new Error("HTTP " + r.status); const b64 = await r.text(); const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0)); const iv = raw.slice(0, 12); const ct = raw.slice(12); const k = await crypto.subtle.importKey("raw", kb, "AES-GCM", false, ["decrypt"]); const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, k, ct); const js = new TextDecoder().decode(pt); const blob = new Blob([js], { type: "application/javascript" }); const url = URL.createObjectURL(blob); const s = document.createElement("script"); s.src = url; document.body.appendChild(s); } catch (e) { document.body.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">页面加载失败，请刷新重试</div>'; console.error("Boot:", e); } })();
    </script>
</body>

</html>
