<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: #0b1020;
            color: #e5e7eb;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        p {
            margin: 0 0 14px;
            color: #9ca3af;
            font-size: 14px;
        }

        .hint {
            color: #c4b5fd;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e5e7eb;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            background: #4f46e5;
            color: #fff;
        }

        #result {
            margin-top: 12px;
            min-height: 22px;
            font-size: 14px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>用户注册</h1>
        <p>前后端分离示例：本页面仅调用后端 API，不直接读写数据库。</p>
        <p class="hint">邀请码请发送邮件至 <b>krvyft@pm.me</b> 获取。</p>

        <label for="username">用户名</label>
        <input id="username" type="text" autocomplete="username" placeholder="请输入用户名" />

        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="new-password" placeholder="至少 8 位" />

        <label for="inviteCode">邀请码</label>
        <input id="inviteCode" type="text" placeholder="请输入邀请码" />

        <button id="registerBtn" type="button">注册</button>
        <div id="result"></div>
    </div>

    <script>
        const API_BASE = window.API_BASE || "";

        const usernameEl = document.getElementById("username");
        const passwordEl = document.getElementById("password");
        const inviteCodeEl = document.getElementById("inviteCode");
        const registerBtn = document.getElementById("registerBtn");
        const resultEl = document.getElementById("result");

        registerBtn.addEventListener("click", async () => {
            const username = usernameEl.value.trim();
            const password = passwordEl.value;
            const inviteCode = inviteCodeEl.value.trim();

            resultEl.style.color = "#93c5fd";
            resultEl.textContent = "提交中...";
            registerBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password, invite_code: inviteCode })
                });

                const data = await response.json().catch(() => ({}));
                const ok = Boolean(data.success) && response.ok;

                resultEl.style.color = ok ? "#34d399" : "#f87171";
                resultEl.textContent = data.message || (ok ? "注册成功" : `注册失败（HTTP ${response.status}）`);
            } catch (err) {
                resultEl.style.color = "#f87171";
                resultEl.textContent = `请求失败：${err.message || err}`;
            } finally {
                registerBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
